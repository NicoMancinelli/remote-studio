name: ShellCheck

on:
  push:
    branches: [ master ]
    paths:
      - '**.sh'
      - 'res'
  pull_request:
    branches: [ master ]
    paths:
      - '**.sh'
      - 'res'

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: './'
        format: gcc

  bats:
    name: Bats tests
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run tests
        run: bats tests/
        if: hashFiles('tests/') != ''
