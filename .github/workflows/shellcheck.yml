name: ShellCheck

on:
  push:
    branches: [ master ]
    paths:
      - '**.sh'
      - 'tests/**'
      - 'Makefile'
      - 'res.sh'
      - 'lib/**'
      - 'package/**'
  pull_request:
    branches: [ master ]
    paths:
      - '**.sh'
      - 'tests/**'
      - 'Makefile'
      - 'res.sh'
      - 'lib/**'
      - 'package/**'
  workflow_dispatch:

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@2.0.0
      with:
        scandir: './'
        format: gcc

  bats:
    name: Local test target
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test tools
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck
      - name: Run tests
        run: make test

  syntax:
    name: App syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify shell and applet syntax
        run: |
          bash -n res.sh install.sh install-remote-studio.sh lib/*.sh package/build-deb.sh
          node --check applet/applet.js
