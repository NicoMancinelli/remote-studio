name: Release .deb

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    name: Build and attach .deb
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dpkg tools
        run: sudo apt-get update && sudo apt-get install -y dpkg shellcheck bats nodejs

      - name: Run release check
        run: make release-check

      - name: Build .deb
        run: bash package/build-deb.sh

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
